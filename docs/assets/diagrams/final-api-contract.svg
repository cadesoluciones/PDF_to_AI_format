<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="690" viewBox="0 0 1200 690" role="img" aria-labelledby="title desc">
  <title id="title">Contrato final de API</title>
  <desc id="desc">Estructura de ConversionResponse, results y assets para conversiones individuales y multiples.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #475569; }
      .card { fill: white; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .main { fill: #ecfeff; stroke: #06b6d4; }
      .item { fill: #ecfdf5; stroke: #10b981; }
      .error { fill: #fff1f2; stroke: #f43f5e; }
      .asset { fill: #fefce8; stroke: #eab308; }
      .h { font: 700 18px Arial, sans-serif; fill: #111827; }
      .b { font: 400 14px Arial, sans-serif; fill: #475569; }
      .mono { font: 400 14px Consolas, monospace; fill: #1e293b; }
      .arrow { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="690"/>
  <text x="60" y="58" class="title">Contrato API uniforme</text>
  <text x="60" y="86" class="subtitle">El frontend renderiza igual un PDF que una carpeta porque siempre recibe results[].</text>

  <rect x="430" y="125" width="340" height="150" class="card main"/>
  <text x="462" y="160" class="h">ConversionResponse</text>
  <text x="462" y="194" class="mono">success: boolean</text>
  <text x="462" y="221" class="mono">mode: "json" | "markdown"</text>
  <text x="462" y="248" class="mono">results: ConversionResultItem[]</text>

  <rect x="100" y="365" width="305" height="190" class="card item"/>
  <text x="130" y="400" class="h">Item correcto</text>
  <text x="130" y="434" class="mono">success: true</text>
  <text x="130" y="461" class="mono">originalName: "a.pdf"</text>
  <text x="130" y="488" class="mono">fileName: "a.json"</text>
  <text x="130" y="515" class="mono">data: unknown</text>

  <rect x="448" y="365" width="305" height="190" class="card error"/>
  <text x="478" y="400" class="h">Item con error</text>
  <text x="478" y="434" class="mono">success: false</text>
  <text x="478" y="461" class="mono">originalName: "b.pdf"</text>
  <text x="478" y="488" class="mono">error: "mensaje claro"</text>
  <text x="478" y="515" class="b">No bloquea los demas PDFs.</text>

  <rect x="795" y="365" width="305" height="190" class="card asset"/>
  <text x="825" y="400" class="h">Assets de imagen</text>
  <text x="825" y="434" class="mono">assets?: [</text>
  <text x="825" y="461" class="mono">  { mimeType, dataUri }</text>
  <text x="825" y="488" class="mono">]</text>
  <text x="825" y="515" class="b">Imagenes como texto base64.</text>

  <path class="arrow" d="M515 275 C420 315 340 330 265 358"/>
  <path class="arrow" d="M600 275 V355"/>
  <path class="arrow" d="M685 275 C780 315 860 330 935 358"/>

  <rect x="150" y="598" width="900" height="48" rx="12" fill="#e0f2fe" stroke="#7dd3fc"/>
  <text x="178" y="628" class="b">Decision: no crear dos APIs mentales. El frontend solo pregunta cuantos results hay y que estado tiene cada item.</text>
</svg>
